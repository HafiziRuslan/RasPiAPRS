name: 'Release'

on:
  push:
    paths-ignore:
      - '.github/**'          # don't run when only files under .github/ change

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.vars.outputs.name }}
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: read version from pyproject
        id: vars
        run: |
          name=$(awk -F"'" "/^name\s*=\s*'/ {print \$2}" pyproject.toml)
          echo "Extracted name: '$name'"
          echo "name=$name" >> "$GITHUB_OUTPUT"

          version=$(awk -F"'" "/^version\s*=\s*'/ {print \$2}" pyproject.toml)
          echo "Extracted version: '$version'"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if [ -z "$version" ]; then
            echo "WARNING: version is empty, trying grep fallback..."
            version=$(grep -oP "(?<=version\s*=\s*')[^']+" pyproject.toml | head -1)
            echo "Fallback version: '$version'"
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

          tag="beta${version#0.1b}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Log version info
        run: |
          echo "Name: ${{ steps.vars.outputs.name }}"
          echo "Version: ${{ steps.vars.outputs.version }}"
          echo "Tag: ${{ steps.vars.outputs.tag }}"

  build:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Archive Release
        uses: thedoctor0/zip-release@main
        with:
          type: 'zip'
          filename: "${{ needs.version.outputs.name }}-${{ needs.version.outputs.version }}.zip"
          exclusions: '*.git* /.git* LICENSE /tests* *lock* sbom* *.md /misc*'
          recursive_exclusions: '*.md'

      - name: Upload Release
        uses: ncipollo/release-action@main
        with:
          allowUpdates: true
          artifacts: "${{ needs.version.outputs.name }}-${{ needs.version.outputs.version }}.zip"
          body: "${{ github.event.head_commit.message }}\n\nby: ${{ github.event.head_commit.author.username }} on ${{ github.event.head_commit.timestamp }}"
          commit: ${{ github.event.head_commit.id }}
          name: ${{ needs.version.outputs.version }}
          prerelease: true
          replacesArtifacts: true
          tag: ${{ needs.version.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update Tag
        uses: richardsimko/update-tag@latest
        with:
          tag_name: ${{ needs.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
