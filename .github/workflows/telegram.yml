name: 'Telegram Message'

on:
  workflow_run:
    workflows:
      - Changelog
    types:
      - completed

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Send Inline Telegram Message
        uses: cbrgm/telegram-github-action@main
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            New commit by <b><a href="https://github.com/${{ github.event.sender.login }}">@${{ github.event.sender.login }}</a></b>!\n\n
            Date: ${{ github.event.workflow_run.head_commit.timestamp }}
            SHA: <code>${{ steps.vars.outputs.sha_short }}</code>
            Reference: ${{ github.event.workflow_run.head_branch }}
            Repository: <a href="https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}">${{ github.repository }}</a>
            Commit: <pre>${{ github.event.workflow_run.head_commit.message }}</pre>
          parse-mode: 'html'
          disable-web-page-preview: true
          disable-notification: false
          protect-content: true
